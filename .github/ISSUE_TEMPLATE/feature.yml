name: Feature request
description: Suggest an enhancement to Murmur
title: "[feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, please search existing issues and Discussions for prior conversation on this topic.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem is this solving? Describe the situation, not the proposed UI.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like Murmur to behave?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you set them aside.
    validations:
      required: false

  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      description: Which part of Murmur is this about? Select all that apply.
      multiple: true
      options:
        - Recording
        - Transcription
        - Settings
        - History
        - Vocabulary
        - Prompts
        - Models
        - Updates
        - Onboarding
        - Notch
        - CLI
        - Docs
    validations:
      required: true

  - type: checkboxes
    id: scope
    attributes:
      label: Scope confirmation
      options:
        - label: I have confirmed this request is not already covered in the v1.0 design spec.
          required: true
