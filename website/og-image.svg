<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" preserveAspectRatio="xMidYMid meet">
  <!--
    Murmur — Open Graph card (1200x630)
    Editorial-magazine cover. System serif/sans only; no external fonts.
    Convert to PNG (required for Slack/Twitter/iMessage previews):
      rsvg-convert  -w 1200  -h 630  -f png  -o website/og-image.png  website/og-image.svg
    or via Chrome headless on the HTML fallback. See website/og-readme.md.
  -->
  <defs>
    <radialGradient id="warmNW" cx="0" cy="0" r="0.6">
      <stop offset="0%"  stop-color="#E8DFC9" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#EFE9DD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warmSE" cx="1" cy="1" r="0.65">
      <stop offset="0%"  stop-color="#DFD5BD" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#EFE9DD" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Paper base + warm corner highlights -->
  <rect width="1200" height="630" fill="#EFE9DD"/>
  <rect width="1200" height="630" fill="url(#warmNW)"/>
  <rect width="1200" height="630" fill="url(#warmSE)"/>

  <!-- ============ MASTHEAD ============ -->
  <!-- Top hairline rule -->
  <line x1="64" y1="118" x2="1136" y2="118" stroke="#1C1814" stroke-opacity="0.28" stroke-width="1"/>

  <!-- Wordmark icon (italic m + sine + dot), matching site header brand-row -->
  <g transform="translate(64,62) scale(1.3)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 22 Q0 10 8 10 Q12 10 12 16 L12 22 M12 16 Q12 10 18 10 Q22 10 22 16 L22 22"
          stroke="#1C1814" stroke-width="2.4"/>
    <path d="M22 18 Q25 16 26.5 18 T29.5 18" stroke="#B23A2A" stroke-width="1.6"/>
    <circle cx="30.5" cy="18" r="1.6" fill="#B23A2A" stroke="none"/>
  </g>
  <!-- Wordmark "Murmur" -->
  <text x="122" y="92"
        font-family="ui-serif, 'New York', Georgia, 'Times New Roman', serif"
        font-style="italic" font-weight="500" font-size="32"
        fill="#1C1814" letter-spacing="-0.4">Murmur</text>

  <!-- Top-right small caps tagline -->
  <text x="1136" y="92" text-anchor="end"
        font-family="ui-sans-serif, -apple-system, 'SF Pro Text', Helvetica, sans-serif"
        font-size="11" font-weight="500" fill="#46403A"
        letter-spacing="2.4">LOCAL-FIRST DICTATION FOR macOS</text>

  <!-- Issue-line strip below masthead -->
  <g font-family="ui-sans-serif, -apple-system, 'SF Pro Text', Helvetica, sans-serif"
     font-size="10.5" fill="#7D766B" letter-spacing="2.3">
    <circle cx="68" cy="146" r="3" fill="#B23A2A"/>
    <text x="78" y="150">VOL. 1  &#183;  NO. 1  &#183;  MAY 2026  &#183;  AN INDEPENDENT RELEASE</text>
  </g>

  <!-- ============ CENTER-LEFT HEADLINE ============ -->
  <!-- Giant italic serif "Murmur" — most prominent element -->
  <text x="60" y="370"
        font-family="ui-serif, 'New York', Georgia, 'Times New Roman', serif"
        font-style="italic" font-weight="500" font-size="196"
        fill="#1C1814" letter-spacing="-6">Murmur</text>

  <!-- Endmark: red pulsing dot — sits at the end of "Murmur" word -->
  <circle cx="640" cy="352" r="13" fill="#B23A2A"/>

  <!-- Standfirst sentence (left-aligned, ~38ch) -->
  <text x="62" y="446"
        font-family="ui-serif, 'New York', Georgia, 'Times New Roman', serif"
        font-size="26" fill="#46403A" letter-spacing="-0.2">
    <tspan x="62" dy="0">Local-first dictation for macOS.</tspan>
    <tspan x="62" dy="36">Double-tap fn, speak, paste.</tspan>
  </text>

  <!-- ============ RIGHT-SIDE COMPOSITION ============ -->
  <!-- Vertical hairline separating headline column from right composition -->
  <line x1="820" y1="200" x2="820" y2="500" stroke="#1C1814" stroke-opacity="0.14" stroke-width="1"/>

  <!-- Small section ornament -->
  <text x="848" y="218"
        font-family="ui-sans-serif, -apple-system, 'SF Pro Text', Helvetica, sans-serif"
        font-size="10.5" fill="#7D766B" letter-spacing="2.4">&#167; COVER  &#183;  NO. 01</text>

  <!-- Three thin gold rules of varying lengths — whisper-decay echo -->
  <g stroke="#94774A" stroke-linecap="round" stroke-width="1.4">
    <line x1="848" y1="270" x2="1136" y2="270" stroke-opacity="0.85"/>
    <line x1="900" y1="312" x2="1100" y2="312" stroke-opacity="0.95"/>
    <line x1="952" y1="354" x2="1048" y2="354" stroke-opacity="0.7"/>
  </g>
  <!-- Red dot at the right end of the middle rule -->
  <circle cx="1100" cy="312" r="5" fill="#B23A2A"/>

  <!-- A damped sine fragment in mute red — echoes the icon tail -->
  <path d="M 848 416 Q 870 400 888 416 T 928 416 T 968 416 T 1008 416 T 1048 416"
        fill="none" stroke="#B23A2A" stroke-opacity="0.55" stroke-width="1.6" stroke-linecap="round"/>
  <circle cx="1054" cy="416" r="3.5" fill="#B23A2A"/>

  <!-- Right-column caption -->
  <text x="848" y="468"
        font-family="ui-sans-serif, -apple-system, 'SF Pro Text', Helvetica, sans-serif"
        font-size="11" fill="#46403A" letter-spacing="2.6">DOUBLE-TAP &#8202;FN&#8202;  &#183;  SPEAK  &#183;  PASTE</text>
  <text x="848" y="490"
        font-family="ui-serif, 'New York', Georgia, 'Times New Roman', serif"
        font-style="italic" font-size="15" fill="#7D766B" letter-spacing="-0.1">the whole product.</text>

  <!-- ============ BOTTOM RULE + META ============ -->
  <line x1="64" y1="554" x2="1136" y2="554" stroke="#1C1814" stroke-opacity="0.28" stroke-width="1"/>

  <text x="64" y="592"
        font-family="ui-sans-serif, -apple-system, 'SF Pro Text', Helvetica, sans-serif"
        font-size="12" fill="#46403A" letter-spacing="2.6">MURMUR-LANDING-PHI.VERCEL.APP</text>

  <text x="1136" y="592" text-anchor="end"
        font-family="ui-sans-serif, -apple-system, 'SF Pro Text', Helvetica, sans-serif"
        font-size="12" fill="#46403A" letter-spacing="2.6">MIT  &#183;  FREE  &#183;  macOS 13+</text>
</svg>
