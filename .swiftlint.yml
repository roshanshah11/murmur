# SwiftLint configuration for the Murmur macOS app (SwiftPM).
# Strict-but-fair ruleset. CI invokes `swiftlint --strict` so warnings fail.

included:
  - app/Sources
  - app/Tests

excluded:
  - app/.build
  - app/build
  - app/Vendor
  - "**/.build/**"
  - "**/build/**"

# Opt-in rules worth turning on for a fresh codebase.
opt_in_rules:
  - empty_count
  - empty_string
  - explicit_init
  - first_where
  - force_unwrapping
  - implicit_return
  - last_where
  - literal_expression_end_indentation
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - private_action
  - private_outlet
  - prohibited_super_call
  - redundant_nil_coalescing
  - sorted_imports
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

disabled_rules:
  - trailing_comma  # SwiftPM/SwiftUI literals routinely use trailing commas

# Per-rule tuning.
file_length:
  warning: 600
  error: 800

function_body_length:
  warning: 80
  error: 120

type_body_length:
  warning: 300
  error: 500

line_length:
  warning: 120
  error: 160
  ignores_urls: true
  ignores_comments: false

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - x
    - y
    - z

cyclomatic_complexity:
  warning: 12
  error: 20

nesting:
  type_level:
    warning: 2

force_unwrapping:
  severity: warning

todo:
  severity: warning

# Custom: keep Murmur from ever silently reverting to FlowLite.
custom_rules:
  banned_flowlite:
    name: "Banned legacy name"
    regex: "FlowLite|flow-lite|Flow Lite"
    message: "Use 'Murmur' — the legacy 'FlowLite' name must not appear in Swift sources."
    severity: error
