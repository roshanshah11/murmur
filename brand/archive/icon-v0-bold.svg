<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    Murmur app icon — v2 Bold
    Heavier italic "m", more dramatic decay, longer wave, bigger red dot.
    Reads from across the room. Editorial but assertive.
  -->
  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#FFFBF5"/>
      <stop offset="100%" stop-color="#F3EBDF"/>
    </linearGradient>

    <radialGradient id="paperShade2" cx="0.5" cy="0.4" r="0.85">
      <stop offset="55%" stop-color="#FFFBF5" stop-opacity="0"/>
      <stop offset="100%" stop-color="#2A1F12" stop-opacity="0.07"/>
    </radialGradient>

    <linearGradient id="tailGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#1A1A1A" stop-opacity="1"/>
      <stop offset="45%" stop-color="#1A1A1A" stop-opacity="0.9"/>
      <stop offset="80%" stop-color="#8A2A25" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#C2362F" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#bgGrad2)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#paperShade2)"/>

  <!--
    Bolder italic m — thicker verticals, slightly steeper slant (~14°),
    glyph sits more compact, shifted slightly left to give the tail more runway.
    Baseline y=730. Glyph approx x=205..640.
  -->
  <g fill="#1A1A1A">
    <!-- First stroke -->
    <path d="
      M 252 730
      C 252 730, 258 706, 274 706
      C 290 706, 304 714, 318 730
      L 360 422
      C 366 388, 382 366, 408 358
      C 374 346, 354 348, 332 364
      C 308 380, 296 408, 290 446
      L 252 730
      Z
      M 230 730
      C 230 750, 240 758, 260 758
      L 318 758
      C 338 758, 348 750, 350 730
      Z"/>

    <!-- Second stroke + arch -->
    <path d="
      M 390 730
      C 390 730, 396 706, 412 706
      C 428 706, 442 714, 456 730
      L 494 446
      C 498 414, 492 396, 472 386
      C 500 374, 528 380, 548 400
      C 568 420, 574 448, 570 482
      L 532 730
      Z
      M 368 730
      C 368 750, 378 758, 398 758
      L 456 758
      C 476 758, 486 750, 488 730
      Z"/>

    <!-- Third stroke -->
    <path d="
      M 560 730
      C 560 730, 566 706, 582 706
      C 598 706, 612 714, 626 730
      L 666 446
      C 670 414, 664 396, 644 386
      C 672 374, 700 380, 720 400
      C 740 420, 746 448, 742 482
      L 702 730
      Z
      M 538 730
      C 538 750, 548 758, 568 758
      L 626 758
      C 646 758, 656 750, 658 730
      Z"/>
  </g>

  <!--
    Dramatic whisper-decay: longer arc, two full sine cycles,
    thicker stroke that thins toward the dot.
  -->
  <g fill="none" stroke="url(#tailGrad2)" stroke-linecap="round">
    <path
      d="
        M 702 730
        C 740 724, 772 706, 794 678
        C 822 644, 846 642, 866 678
        C 886 712, 906 712, 924 678
        C 938 652, 948 654, 956 678
        C 962 694, 968 696, 974 680
        C 978 670, 982 670, 986 678
      "
      stroke-width="20"
    />
  </g>

  <!-- Bigger red dot anchoring the right edge -->
  <circle cx="998" cy="678" r="20" fill="#C2362F"/>
</svg>
