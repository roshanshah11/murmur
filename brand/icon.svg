<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    Murmur app icon — locked direction (D): italic serif lowercase m + small red dot.
    Renders via SVG <text> with ui-serif → New York on Apple platforms (the
    primary target). Falls back through Cormorant Garamond → Georgia → Times.
    For raster pipelines that don't resolve fonts, rsvg-convert is invoked
    with --keep-aspect-ratio and the underlying fontconfig stack provides
    Georgia, which renders an acceptable italic m at all required sizes.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFBF5"/>
      <stop offset="100%" stop-color="#F3EBDF"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <text x="156" y="760"
        font-family="ui-serif, 'New York', 'Cormorant Garamond', Georgia, 'Times New Roman', serif"
        font-style="italic" font-weight="500" font-size="720" fill="#1A1A1A">m</text>
  <circle cx="830" cy="678" r="44" fill="#C2362F"/>
</svg>
